<script>
  // This script reads SITE_CONTENT (defined at the top of the file)
  // and fills in all the text on the page. You shouldn't need to

  // only edit the SITE_CONTENT object near the top of the file.

  const esc = (str) => {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  };

  // Nav
  document.getElementById('nav-logo').innerHTML =
    `${esc(SITE_CONTENT.nav.logoFirst)}<span>.</span>${esc(SITE_CONTENT.nav.logoLast)}`;
  document.getElementById('nav-tagline').textContent = SITE_CONTENT.nav.tagline;
  document.getElementById('nav-tagline-mobile').textContent = SITE_CONTENT.nav.taglineMobile;
  document.getElementById('nav-links').innerHTML = SITE_CONTENT.nav.links
    .map((label, i) => {
      const targets = ['#about', '#stages', '#how'];
      return `<li><a href="${targets[i] || '#'}">${esc(label)}</a></li>`;
    }).join('');
  document.getElementById('nav-cta').textContent = SITE_CONTENT.nav.cta;

  // Hero
  document.getElementById('hero-headline').textContent = SITE_CONTENT.hero.headline;
  document.getElementById('hero-stats').innerHTML = SITE_CONTENT.hero.stats.map(s => `

      <div class="stat-num mono">${esc(s.num)}</div>
      <div class="stat-label">${esc(s.label)}</div>
    </div>
  `).join('');

  // About
  document.getElementById('about-label').textContent = SITE_CONTENT.about.label;
  document.getElementById('about-title').textContent = SITE_CONTENT.about.title;
  document.getElementById('about-paragraphs').innerHTML = SITE_CONTENT.about.paragraphs

  document.getElementById('stages-label').textContent = SITE_CONTENT.stagesSection.label;
  document.getElementById('stages-title').textContent = SITE_CONTENT.stagesSection.title;
  document.getElementById('stages-intro').textContent = SITE_CONTENT.stagesSection.intro;

  // Stage cards
  document.getElementById('stage-cards').innerHTML = SITE_CONTENT.stages.map(s => `
    <div class="stage-card">
      <div class="stage-head">
        <div>
          <div class="stage-tag">${esc(s.tag)}</div>
          <h3>${esc(s.title)}</h3>
        </div>
        <div class="stage-rev">${esc(s.rangeLabel)}</div>
      </div>
      <div class="stage-body">
        <div class="spec-row">
          <div class="spec-key">Scenario</div>
          <div class="spec-val">${esc(s.scenario)}</div>
        </div>
        <div class="spec-row">
          <div class="spec-key">Goal</div>
          <div class="spec-val">${esc(s.goal)}</div>
        </div>
        <div class="spec-row">
          <div class="spec-key">Commitment</div>
          <div class="spec-val tight">${esc(s.commitment)}</div>
        </div>
        <div class="spec-row">
          <div class="spec-key">Services</div>
          <div class="spec-val">
            <div class="services-grid">
              ${s.services.map(item => `<div>${esc(item)}</div>`).join('')}
            </div>
          </div>
        </div>
      </div>
    </div>
  `).join('');

  // Additional services
  document.getElementById('extra-label').textContent = SITE_CONTENT.extraSection.label;
  document.getElementById('extra-title').textContent = SITE_CONTENT.extraSection.title;
  document.getElementById('extra-grid').innerHTML = SITE_CONTENT.extras.map(e => `
    <div class="extra-card">
      <div class="num mono">${esc(e.num)}</div>
      <h4>${esc(e.title)}</h4>
      <p>${esc(e.body)}</p>
    </div>
  `).join('');

  // How I work
  document.getElementById('how-label').textContent = SITE_CONTENT.howSection.label;
  document.getElementById('how-title').textContent = SITE_CONTENT.howSection.title;
  document.getElementById('work-cols').innerHTML = SITE_CONTENT.howSection.columns.map(col => `

      <h4>${esc(col.heading)}</h4>
      ${col.paragraphs.map(p => `<p>${esc(p)}</p>`).join('')}
    </div>
  `).join('');

  // Work with me / CTA
  document.getElementById('work-label').textContent = SITE_CONTENT.workSection.label;
  document.getElementById('work-title').textContent = SITE_CONTENT.workSection.title;
  document.getElementById('work-intro').textContent = SITE_CONTENT.workSection.intro;
  document.getElementById('secondary-link').innerHTML =
    `${esc(SITE_CONTENT.workSection.secondaryPrefix)} <a href="${SITE_CONTENT.workSection.secondaryLinkUrl}">${esc(SITE_CONTENT.workSection.secondaryLinkText)}</a>`;

  document.getElementById('footer-left').textContent = SITE_CONTENT.footer.left;
  document.getElementById('footer-right').textContent = SITE_CONTENT.footer.right;
